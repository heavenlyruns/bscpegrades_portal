<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { margin:0; font-family: Arial; background:#0f172a; color:white; }
.center { display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; }
input { padding:10px; margin:5px; border-radius:6px; border:none; width:220px; }
button { padding:10px; border:none; border-radius:8px; background:#3b82f6; color:white; cursor:pointer; margin-top:5px; }
.dashboard { display:none; padding:20px; }
</style>
</head>
<body>

<div id="loginPage" class="center">
  <h2>Student Portal</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="signUp()">Create Account</button>
  <button onclick="login()">Login</button>
  <p id="msg"></p>
</div>

<div id="dashboard" class="dashboard">
  <h1>Student Dashboard</h1>
  <p id="userName"></p>

  <table border="1" width="100%" id="gradeTable"></table>
  <canvas id="chart"></canvas>
</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function signUp() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("msg").innerText = "Account created! You can now login.";
    })
    .catch(err => document.getElementById("msg").innerText = err.message);
}

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(userCredential => {
      const user = userCredential.user;
      document.getElementById("loginPage").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      document.getElementById("userName").innerText = user.email;

      loadGrades(user.email);
    })
    .catch(err => document.getElementById("msg").innerText = err.message);
}

function loadGrades(email) {
  db.collection("students").doc(email).get().then(doc => {
    let grades;

    if(!doc.exists) {
      grades = [
        {course:"MATH", grade:1.9},
        {course:"CHEM", grade:1.3},
        {course:"CMPE", grade:1.4}
      ];

      db.collection("students").doc(email).set({grades});
    } else {
      grades = doc.data().grades;
    }

    let table = "<tr><th>Course</th><th>Grade</th></tr>";
    let labels = [], data = [];

    grades.forEach(g => {
      table += `<tr><td>${g.course}</td><td>${g.grade}</td></tr>`;
      labels.push(g.course);
      data.push(g.grade);
    });

    document.getElementById("gradeTable").innerHTML = table;

    new Chart(document.getElementById("chart"), {
      type: 'bar',
      data: { labels: labels, datasets:[{label:"Grades", data:data}] }
    });
  });
}
</script>

</body>
</html>
