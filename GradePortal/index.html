<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .hidden { display: none; }
    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      width: 320px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .dashboard {
      display: grid;
      grid-template-columns: 250px 1fr;
      height: 100vh;
    }
    .sidebar {
      background: #020617;
      padding: 20px;
    }
    .sidebar h2 { color: #3b82f6; }
    .main {
      padding: 20px;
      overflow-y: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
    }
    th, td {
      padding: 10px;
      text-align: center;
    }
    th { background: #3b82f6; }
    tr:nth-child(even) { background: #334155; }
    .gwa {
      margin-top: 20px;
      font-size: 1.3em;
      font-weight: bold;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
  <div class="card">
    <h2>Student Login</h2>
    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />
    <button id="loginBtn">Login</button>
    <p id="error" style="color:red"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard hidden">
  <div class="sidebar">
    <h2>Portal</h2>
    <p>Welcome, Student</p>
  </div>

  <div class="main">
    <h1>First Semester Grades</h1>

    <table>
      <tr>
        <th>Course</th>
        <th>Units</th>
        <th>Grade</th>
      </tr>
      <tr><td>MATH 113</td><td>3</td><td>1.90</td></tr>
      <tr><td>CHEM 114</td><td>4</td><td>1.30</td></tr>
      <tr><td>CMPE 111</td><td>1</td><td>1.40</td></tr>
      <tr><td>CMPE 112</td><td>2</td><td>1.60</td></tr>
      <tr><td>GE115B</td><td>3</td><td>1.20</td></tr>
      <tr><td>GE3AC</td><td>3</td><td>1.30</td></tr>
      <tr><td>GE123</td><td>3</td><td>1.30</td></tr>
      <tr><td>PE 1</td><td>2</td><td>1.10</td></tr>
      <tr><td>NSTP 113</td><td>3</td><td>1.50</td></tr>
      <tr><td>THEO113</td><td>3</td><td>1.40</td></tr>
    </table>

    <div class="gwa">GWA: 1.40</div>

    <canvas id="gradeChart" height="100"></canvas>
  </div>
</div>

<script>
// Attach event safely after DOM loads
window.addEventListener('DOMContentLoaded', function() {
  const btn = document.getElementById('loginBtn');

  btn.addEventListener('click', function() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();

    if(user === "student" && pass === "1234") {
      document.getElementById('loginPage').style.display = "none";
      document.getElementById('dashboard').style.display = "grid";
      loadChart();
    } else {
      document.getElementById('error').innerText = "Invalid login";
    }
  });
});

function loadChart() {
  const ctx = document.getElementById('gradeChart');
  if (!ctx || typeof Chart === 'undefined') return;

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['MATH','CHEM','CMPE111','CMPE112','GE115B','GE3AC','GE123','PE','NSTP','THEO'],
      datasets: [{
        label: 'Grades',
        data: [1.9,1.3,1.4,1.6,1.2,1.3,1.3,1.1,1.5,1.4]
      }]
    }
  });
}
</script>

</body>
</html>
